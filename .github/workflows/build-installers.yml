name: Build Multi-Platform Installers

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build JAR
      run: |
        cd pdf-preflight
        mvn clean package -DskipTests
    
    - name: Build macOS Installer
      run: |
        cd pdf-preflight
        chmod +x build-installer.sh
        ./build-installer.sh
      continue-on-error: false
    
    - name: Upload macOS Installer
      uses: actions/upload-artifact@v4
      with:
        name: pratt-pdf-checker-macos
        path: dist/*.dmg
        if-no-files-found: error
    
    - name: Upload to GitHub Releases (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.dmg
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build JAR
      run: |
        cd pdf-preflight
        mvn clean package -DskipTests
    
    - name: Build Windows Installer
      run: |
        cd pdf-preflight
        .\build-installer.bat
      continue-on-error: false
    
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: pratt-pdf-checker-windows
        path: dist/*.exe
        if-no-files-found: error
    
    - name: Upload to GitHub Releases (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.exe
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install packaging tools
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm
    
    - name: Build JAR
      run: |
        cd pdf-preflight
        mvn clean package -DskipTests
    
    - name: Build Linux Installer
      run: |
        cd pdf-preflight
        chmod +x build-installer-linux.sh
        ./build-installer-linux.sh
      continue-on-error: false
    
    - name: Upload Linux Installers
      uses: actions/upload-artifact@v4
      with:
        name: pratt-pdf-checker-linux
        path: dist/*
        if-no-files-found: error
    
    - name: Upload to GitHub Releases (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
